name: 🤖 AI Simulator Factory - Generate & Deploy

on:
  workflow_dispatch:
    inputs:
      theme:
        description: 'Specific theme (mining, farming, business, space, idle)'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm install
      
      - name: 🤖 Generate simulator
        id: generate
        run: |
          if [ -z "${{ github.event.inputs.theme }}" ]; then
            node scripts/generate.js
          else
            node scripts/generate.js ${{ github.event.inputs.theme }}
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      
      - name: 📝 Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add output/ data/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-generate simulator: ${{ steps.generate.outputs.theme }}"
          git push
      
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: false